name: Install Dependencies
description: "Sets up dependencies for UNO Windows/Linux builds"

inputs:
  target-platform:
    description: 'The platform(s) to install dependencies for (default: win linux)'
    required: false
    default: 'win linux'
  dotnet-version:
    description: 'Installs and sets the .NET SDK Version'
    required: false
    default: '9.0.x'

runs:
  using: "composite"
  steps:
    # Install .NET
    - name: Setup .NET ${{ inputs.dotnet-version }}
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '${{ inputs.dotnet-version }}'

    # Install uno-check and required workloads
    - name: Install ${{ inputs.target-platform }} Workloads
      shell: pwsh
      run: |
        dotnet tool install -g uno.check

        $targets = @()
        if ("${{ inputs.target-platform }}" -match "win")   { $targets += "skia-wpf" }
        if ("${{ inputs.target-platform }}" -match "linux") { $targets += "skia-gtk" }

        foreach ($target in $targets) {
          echo "Installing workloads for target: $target"
          uno-check -v --ci --non-interactive --fix `
            --target $target `
            --skip vswin --skip vsmac --skip xcode `
            --skip vswinworkloads --skip androidemulator --skip dotnetnewunotemplates
        }
