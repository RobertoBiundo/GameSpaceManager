name: CI

on:
  push:
    branches:
      - develop
      - release/**

  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop
      - release/**

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      STEP_TIMEOUT_MINUTES: 30  # adjust if needed

    steps:
      # Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Install dependencies (custom step you already have)
      - name: Install Dependencies
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        uses: "./.github/steps/install_dependencies"

      # Restore NuGet packages
      - name: Restore Packages
        run: dotnet restore

      # Build project
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Publish the final executables
      - name: Publish Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet publish GameSpaceManager/GameSpaceManager.csproj -c Release -f net9.0-desktop -r linux-x64 -p:SelfContained=true -p:PublishSingleFile=true -o ./publish/linux

      - name: Publish Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >
          dotnet publish GameSpaceManager/GameSpaceManager.csproj 
          -c Release
          -f net9.0-desktop
          -r win-x64
          --self-contained true
          -o ./publish/windows
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true

      # Upload artifacts for each OS
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GameSpaceManager-${{ matrix.os }}
          path: ${{ matrix.os == 'ubuntu-latest' && 'publish/linux' || 'publish/windows' }}
